<style>
:root { --gold: #D4A84B; --bg: #0C0A08; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); overflow-x: hidden; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #161310; }
::-webkit-scrollbar-thumb { background: #3E362C; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }

/* Bokeh atmosphere */
.bokeh { position: fixed; border-radius: 50%; pointer-events: none; will-change: transform; }
@keyframes drift1 {
0%,100% { transform: translate(0,0) scale(1); }
33% { transform: translate(40px,-70px) scale(1.12); }
66% { transform: translate(-30px,-30px) scale(0.88); }
}
@keyframes drift2 {
0%,100% { transform: translate(0,0) scale(1); }
50% { transform: translate(-60px,50px) scale(1.15); }
}
@keyframes drift3 {
0%,100% { transform: translate(0,0) scale(0.95); }
40% { transform: translate(70px,30px) scale(1.1); }
80% { transform: translate(-20px,60px) scale(1); }
}

/* Film grain */
.film-grain {
position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.025;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Search glow */
#search-input:focus { box-shadow: 0 0 0 2px rgba(212,168,75,0.12), 0 0 40px rgba(212,168,75,0.06); }
#search-input::placeholder { color: #5A5448; }

/* Card entrance */
.movie-card { opacity: 0; transform: translateY(24px); animation: cardUp .45s ease forwards; }
@keyframes cardUp { to { opacity: 1; transform: translateY(0); } }

/* Card hover */
.card-inner { transition: border-color .25s, box-shadow .25s, transform .25s; }
.card-inner:hover { border-color: rgba(212,168,75,0.35); box-shadow: 0 8px 32px rgba(212,168,75,0.06); transform: translateY(-3px); }

/* Mood cards */
.mood-card { transition: all .25s ease; }
.mood-card:hover { border-color: rgba(212,168,75,0.4); box-shadow: 0 4px 24px rgba(212,168,75,0.08); transform: translateY(-2px); }
.mood-card.selected { border-color: rgba(212,168,75,0.6); box-shadow: 0 4px 24px rgba(212,168,75,0.12); background: rgba(212,168,75,0.08); }
.mood-card.selected .mood-icon { color: #D4A84B; }

/* Genre chips */
.genre-chip { transition: all .2s ease; cursor: pointer; user-select: none; }
.genre-chip:hover, .genre-chip.active { background: rgba(212,168,75,0.18); color: #F0D88A; border-color: rgba(212,168,75,0.4); }

/* Sort buttons */
.sort-btn { transition: all .2s ease; }
.sort-btn.active { background: rgba(212,168,75,0.15); color: #D4A84B; border-color: rgba(212,168,75,0.3); }

/* Modal */
.modal-backdrop { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }

/* Line clamp */
.line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

/* Gold accent line */
.gold-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(212,168,75,0.25), transparent); }

/* Spin animation */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { animation: spin .8s linear infinite; }

/* Subtle pulse for rating badge */
@keyframes softPulse {
0%,100% { box-shadow: 0 0 0 0 rgba(212,168,75,0.3); }
50% { box-shadow: 0 0 8px 2px rgba(212,168,75,0.15); }
}
.rating-badge { animation: softPulse 3s ease-in-out infinite; }

/* Modal slide-in */
.modal-content { animation: modalIn .3s ease forwards; }
@keyframes modalIn { from { opacity: 0; transform: translateY(40px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

/* Dice roll wiggle */
@keyframes wiggle {
0%,100% { transform: rotate(0deg); }
25% { transform: rotate(-12deg); }
50% { transform: rotate(8deg); }
75% { transform: rotate(-5deg); }
}
.wiggle { animation: wiggle .5s ease; }

/* Section fade */
.fade-in { animation: fadeIn .4s ease forwards; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Recommendation badge shimmer */
@keyframes shimmer {
0% { background-position: -200% center; }
100% { background-position: 200% center; }
}
.rec-badge {
background: linear-gradient(90deg, #D4A84B 0%, #F0D88A 40%, #D4A84B 60%, #F0D88A 100%);
background-size: 200% auto;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
animation: shimmer 4s linear infinite;
}

@media (prefers-reduced-motion: reduce) {
.bokeh, .movie-card, .modal-content, .wiggle, .fade-in { animation: none !important; }
.movie-card { opacity: 1; transform: none; }
.card-inner:hover, .mood-card:hover { transform: none; }
.rating-badge, .rec-badge { animation: none; }
.rec-badge { -webkit-text-fill-color: #D4A84B; }
}
</style></head>

<script>
/* ===== State ===== */
let movies = [];
let dataLoaded = false;
let dataPromise = null;
let currentMood = '';
let currentGenre = '';
let currentSearch = '';
let currentSort = 'recommended';
let visibleCount = 12;
let lastResults = [];
let shuffleSeed = Math.random();

/* ===== Mood definitions ===== */
const MOODS = [
{ id: 'feelgood', label: 'Feel Good', icon: 'fa-face-smile', genres: ['Comedy','Romance','Family','Musical'] },
{ id: 'intense', label: 'Intense', icon: 'fa-bolt', genres: ['Action','Thriller','Crime','War'] },
{ id: 'emotional', label: 'Heartfelt', icon: 'fa-heart', genres: ['Drama','Romance','Musical','Family'] },
{ id: 'dark', label: 'Dark & Gritty', icon: 'fa-moon', genres: ['Thriller','Crime','Horror','Mystery'] },
{ id: 'epic', label: 'Epic', icon: 'fa-crown', genres: ['Action','War','Adventure','Drama'] },
{ id: 'fun', label: 'Fun & Light', icon: 'fa-champagne-glasses', genres: ['Comedy','Musical','Romance','Family'] },
{ id: 'romantic', label: 'Romantic', icon: 'fa-heart-pulse', genres: ['Romance','Musical','Drama'] },
{ id: 'spinechill', label: 'Spine-Chilling', icon: 'fa-ghost', genres: ['Horror','Thriller','Mystery'] },
];

const GENRE_CHIPS = ['Drama','Romance','Action','Comedy','Thriller','Musical','Crime','Family','Horror','War','Adventure','Mystery'];

/* ===== Gradient palette ===== */
const CARD_GRADIENTS = [
'linear-gradient(135deg, #9B1B30 0%, #3D0D14 100%)',
'linear-gradient(135deg, #C9A84C 0%, #5A4A1E 100%)',
'linear-gradient(135deg, #7B3F00 0%, #3A1E00 100%)',
'linear-gradient(135deg, #8B1A1A 0%, #4A0E0E 100%)',
'linear-gradient(135deg, #6B4226 0%, #3A2210 100%)',
'linear-gradient(135deg, #A0522D 0%, #502916 100%)',
'linear-gradient(135deg, #800020 0%, #400010 100%)',
'linear-gradient(135deg, #B8860B 0%, #5A4306 100%)',
'linear-gradient(135deg, #704214 0%, #38210A 100%)',
'linear-gradient(135deg, #8B4513 0%, #4A2409 100%)',
];

function gradientForTitle(title) {
let h = 0;
for (let i = 0; i < title.length; i++) h = ((h << 5) - h + title.charCodeAt(i)) | 0;
return CARD_GRADIENTS[Math.abs(h) % CARD_GRADIENTS.length];
}

/* ===== Seeded shuffle for repeatable "Shuffle" ===== */
function seededShuffle(arr, seed) {
const a = [...arr];
let s = seed;
for (let i = a.length - 1; i > 0; i--) {
s = (s * 16807 + 0.5) % 1;
const j = Math.floor(s * (i + 1));
[a[i], a[j]] = [a[j], a[i]];
}
return a;
}

/* ===== CSV Parser ===== */
function parseCSV(text) {
const rows = [];
let row = [], field = '', inQ = false, i = 0;
while (i < text.length) {
const c = text[i];
if (inQ) {
if (c === '"') {
if (i + 1 < text.length && text[i+1] === '"') { field += '"'; i += 2; }
else { inQ = false; i++; }
} else { field += c; i++; }
} else {
if (c === '"') { inQ = true; i++; }
else if (c === ',') { row.push(field.trim()); field = ''; i++; }
else if (c === '\r') {
row.push(field.trim()); if (row.some(f => f !== '')) rows.push(row);
row = []; field = ''; i++; if (i < text.length && text[i] === '\n') i++;
} else if (c === '\n') {
row.push(field.trim()); if (row.some(f => f !== '')) rows.push(row);
row = []; field = ''; i++;
} else { field += c; i++; }
}
}
row.push(field.trim());
if (row.some(f => f !== '')) rows.push(row);
return rows;
}

function csvToObjects(rows) {
if (rows.length < 2) return [];
const headers = rows[0].map(h => h.replace(/^"|"$/g, '').trim());
return rows.slice(1).map(row => {
const obj = {};
headers.forEach((h, idx) => { obj[h] = idx < row.length ? row[idx] : ''; });
return obj;
});
}

/* ===== Normalize helpers ===== */
function norm(str) {
return (str || '').toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
}

function normTitleYear(title, year) {
return norm(title) + '|' + String(year || '').trim();
}

function parseRating(val) {
const n = parseFloat(val);
return isNaN(n) ? null : Math.round(n * 10) / 10;
}

function parseYear(val) {
const s = String(val || '').trim();
const m = s.match(/(\d{4})/);
return m ? parseInt(m[1]) : null;
}

function splitNames(str) {
if (!str) return [];
return str.split(/[|,]/).map(s => s.trim()).filter(s => s.length > 0);
}

/* ===== Data Loading ===== */
async function loadData() {
const url1 = 'https://raw.githubusercontent.com/calci/bollywood-movie-dataset/master/BollywoodMovieDetail.csv';
const url2 = 'https://raw.githubusercontent.com/pncnmnp/TIMDB/master/1950-2019/bollywood_full.csv';

const [resp1, resp2] = await Promise.allSettled([
fetch(url1).then(r => r.text()),
fetch(url2).then(r => r.text())
]);

let data1 = [], data2 = [];
if (resp1.status === 'fulfilled') { try { data1 = csvToObjects(parseCSV(resp1.value)); } catch(e) {} }
if (resp2.status === 'fulfilled') { try { data2 = csvToObjects(parseCSV(resp2.value)); } catch(e) {} }

const merged = new Map();

/* Dataset 2 is richer — primary source */
data2.forEach(d => {
const title = (d.title || d.original_title || '').trim();
const year = parseYear(d.year_of_release || d.title_year || '');
if (!title) return;
const key = normTitleYear(title, year);
if (!merged.has(key)) {
merged.set(key, {
title, year,
genres: splitNames(d.genres || ''),
rating: parseRating(d.imdb_rating || d.imdb_score || ''),
actors: splitNames(d.actors || [d.actor_1_name, d.actor_2_name, d.actor_3_name].filter(Boolean).join(', ')),
directors: splitNames(d.directors || d.director_name || ''),
writers: splitNames(d.writers || d.writer_1_name || ''),
imdbId: (d.imdb_id || d.imdbId || '').replace(/^tt/, ''),
runtime: d.runtime || d.duration || '',
sequel: d.is_sequel || d.sequel || '',
hitFlop: null,
});
}
});

/* Supplement with dataset 1 */
data1.forEach(d => {
const title = (d.title || '').trim();
const year = parseYear(d.releaseYear || d.releaseDate || '');
if (!title) return;
const key = normTitleYear(title, year);
if (merged.has(key)) {
const ex = merged.get(key);
if (!ex.imdbId && d.imdbId) ex.imdbId = d.imdbId;
if (ex.actors.length === 0) ex.actors = splitNames(d.actors || '');
if (ex.directors.length === 0) ex.directors = splitNames(d.directors || '');
if (ex.writers.length === 0) ex.writers = splitNames(d.writers || '');
if (ex.genres.length === 0) ex.genres = splitNames(d.genre || '');
if (!ex.hitFlop && d.hitFlop) ex.hitFlop = parseFloat(d.hitFlop) || null;
if (ex.sequel === '' && d.sequel) ex.sequel = d.sequel;
} else {
merged.set(key, {
title, year,
genres: splitNames(d.genre || ''),
rating: null,
actors: splitNames(d.actors || ''),
directors: splitNames(d.directors || ''),
writers: splitNames(d.writers || ''),
imdbId: (d.imdbId || '').replace(/^tt/, ''),
runtime: '',
sequel: d.sequel || '',
hitFlop: parseFloat(d.hitFlop) || null,
});
}
});

return Array.from(merged.values()).filter(m => m.title.length > 0);
}

/* ===== Recommendation Engine ===== */

/* Score a movie's relevance to a mood */
function moodScore(movie, moodId) {
const mood = MOODS.find(m => m.id === moodId);
if (!mood) return 0;
let score = 0;
mood.genres.forEach(mg => {
if (movie.genres.some(g => norm(g) === norm(mg))) score += 3;
});
/* Bonus for high rating */
if (movie.rating && movie.rating >= 7) score += 2;
else if (movie.rating && movie.rating >= 6) score += 1;
return score;
}

/* Score a movie for search query */
function searchScore(movie, query) {
const words = norm(query).split(/\s+/).filter(w => w.length > 1);
if (words.length === 0) return 0;
let score = 0, matched = 0;
const titleN = norm(movie.title);
const actorsN = movie.actors.map(a => norm(a)).join(' ');
const dirsN = movie.directors.map(d => norm(d)).join(' ');
const genresN = movie.genres.map(g => norm(g)).join(' ');
const all = titleN + ' ' + actorsN + ' ' + dirsN + ' ' + genresN;

words.forEach(w => {
if (titleN.includes(w)) score += 5;
else if (actorsN.includes(w) || dirsN.includes(w)) score += 3;
else if (genresN.includes(w)) score += 2;
else if (all.includes(w)) score += 1;
if (all.includes(w)) matched++;
});
return matched < words.length ? 0 : score;
}

/* Get recommendations based on current state */
function getRecommendations() {
let pool = [...movies];

/* Filter by mood */
if (currentMood) {
pool = pool.filter(m => moodScore(m, currentMood) > 0);
}

/* Filter by genre */
if (currentGenre) {
const gn = norm(currentGenre);
pool = pool.filter(m => m.genres.some(g => norm(g).includes(gn)));
}

/* Filter by search */
if (currentSearch) {
pool = pool.filter(m => searchScore(m, currentSearch) > 0);
}

/* Score each movie */
const scored = pool.map(m => {
let s = 0;
if (currentMood) s += moodScore(m, currentMood);
if (currentSearch) s += searchScore(m, currentSearch);
/* Inherent quality boost */
if (m.rating && m.rating >= 7.5) s += 2;
else if (m.rating && m.rating >= 6.5) s += 1;
return { ...m, recScore: s };
}).filter(m => m.recScore > 0);

return scored;
}

function sortResults(results, mode) {
const sorted = [...results];
if (mode === 'rating') {
sorted.sort((a, b) => (b.rating || 0) - (a.rating || 0) || b.recScore - a.recScore);
} else if (mode === 'year') {
sorted.sort((a, b) => (b.year || 0) - (a.year || 0) || b.recScore - a.recScore);
} else {
/* "Best Bets" — weighted by recScore + rating, with shuffle variety */
sorted.sort((a, b) => {
const aScore = a.recScore + (a.rating || 5) * 0.5;
const bScore = b.recScore + (b.rating || 5) * 0.5;
return bScore - aScore;
});
/* Add slight shuffle within top tier so it feels fresh each time */
const tierSize = 30;
if (sorted.length > tierSize) {
const top = seededShuffle(sorted.slice(0, tierSize), shuffleSeed);
/* Re-sort top by score but with jitter */
top.sort((a, b) => {
const aScore = a.recScore + (a.rating || 5) * 0.5 + (Math.random() * 1.5 - 0.75);
const bScore = b.recScore + (b.rating || 5) * 0.5 + (Math.random() * 1.5 - 0.75);
return bScore - aScore;
});
return [...top, ...sorted.slice(tierSize)];
}
}
return sorted;
}

/* ===== Rendering ===== */

function renderMoodGrid() {
const container = document.getElementById('mood-grid');
container.innerHTML = MOODS.map(m => `
<button class="mood-card bg-card border border-border rounded-xl p-4 text-center ${currentMood === m.id ? 'selected' : ''}" data-mood="${m.id}" aria-label="${m.label} mood" aria-pressed="${currentMood === m.id}">
<i class="fas ${m.icon} mood-icon text-xl mb-2 ${currentMood === m.id ? 'text-gold' : 'text-dimmed'} transition-colors"></i>
<p class="text-xs font-medium ${currentMood === m.id ? 'text-cream' : 'text-muted'} transition-colors">${m.label}</p>
</button>
`).join('');
}

function renderGenreChips() {
const container = document.getElementById('genre-chips');
container.innerHTML = GENRE_CHIPS.map(g =>
`<button class="genre-chip text-xs px-3 py-1.5 rounded-lg border border-border text-muted ${currentGenre === g ? 'active' : ''}" data-genre="${g}" aria-label="Filter by ${g}">${g}</button>`
).join('');
}

function renderCard(movie, index) {
const grad = gradientForTitle(movie.title);
const initial = (movie.title || '?')[0].toUpperCase();
const yearStr = movie.year ? String(movie.year) : '';
const ratingStr = movie.rating ? movie.rating.toFixed(1) : '';
const genreTags = movie.genres.slice(0, 3).map(g =>
`<span class="inline-block text-[11px] px-2 py-0.5 rounded" style="background:rgba(212,168,75,0.1);color:#D4A84B;">${g}</span>`
).join('');
const directorStr = movie.directors.slice(0, 2).join(', ');
const actorStr = movie.actors.slice(0, 3).join(', ');

return `
<div class="movie-card" style="animation-delay:${index * 50}ms">
<div class="card-inner bg-card border border-border rounded-xl overflow-hidden cursor-pointer" tabindex="0" role="button" aria-label="View details for ${movie.title.replace(/"/g, '&quot;')}" data-idx="${index}">
<div class="h-28 flex items-center justify-center relative" style="background:${grad}">
<span class="font-display text-7xl font-black select-none" style="color:rgba(255,255,255,0.08)">${initial}</span>
${ratingStr ? `<div class="rating-badge absolute top-3 right-3 text-xs font-bold px-2 py-0.5 rounded" style="background:#D4A84B;color:#0C0A08;">${ratingStr} <i class="fas fa-star text-[9px]" style="color:#0C0A08;"></i></div>` : ''}
${yearStr ? `<div class="absolute bottom-3 left-3 text-xs font-medium px-2 py-0.5 rounded" style="background:rgba(0,0,0,0.45);color:rgba(240,235,224,0.7);">${yearStr}</div>` : ''}
</div>
<div class="p-4">
<h3 class="font-display text-base font-bold text-cream leading-snug line-clamp-1">${movie.title}</h3>
<div class="flex flex-wrap gap-1.5 mt-2.5 min-h-[22px]">${genreTags || '<span class="text-dimmed text-xs">—</span>'}</div>
${directorStr ? `<p class="text-muted text-xs mt-3 line-clamp-1"><i class="fas fa-clapperboard text-gold-dim mr-1.5 text-[10px]"></i>${directorStr}</p>` : ''}
${actorStr ? `<p class="text-muted text-xs mt-1.5 line-clamp-1"><i class="fas fa-users text-gold-dim mr-1.5 text-[10px]"></i>${actorStr}</p>` : ''}
</div>
</div>
</div>`;
}

function renderResults(results) {
const grid = document.getElementById('results-grid');
const shown = results.slice(0, visibleCount);
grid.innerHTML = shown.map((m, i) => renderCard(m, i)).join('');

const loadMore = document.getElementById('load-more-wrap');
loadMore.classList.toggle('hidden', results.length <= visibleCount);

const countEl = document.getElementById('results-label');
const total = results.length;
const showing = Math.min(visibleCount, total);

/* Dynamic label based on context */
let label = '';
if (currentMood) {
const moodObj = MOODS.find(m => m.id === currentMood);
label = `<span class="rec-badge font-display font-bold">${showing}</span> <span class="text-muted">${moodObj.label} pick${showing !== 1 ? 's' : ''} for you</span>`;
} else if (currentSearch) {
label = `<span class="rec-badge font-display font-bold">${showing}</span> <span class="text-muted">match${showing !== 1 ? 'es' : ''} for "${currentSearch}"</span>`;
} else if (currentGenre) {
label = `<span class="rec-badge font-display font-bold">${showing}</span> <span class="text-muted">${currentGenre} recommendation${showing !== 1 ? 's' : ''}</span>`;
} else {
label = `<span class="rec-badge font-display font-bold">${showing}</span> <span class="text-muted">pick${showing !== 1 ? 's' : ''} for you</span>`;
}
if (total > showing) {
label += ` <span class="text-dimmed text-xs">of ${total}</span>`;
}
countEl.innerHTML = label;

document.querySelectorAll('.sort-btn').forEach(btn => {
btn.classList.toggle('active', btn.dataset.sort === currentSort);
});
}

function showSection(id) {
['results-section', 'loading-state', 'empty-state'].forEach(s => {
const el = document.getElementById(s);
if (s === id) { el.classList.remove('hidden'); el.classList.add('fade-in'); }
else { el.classList.add('hidden'); el.classList.remove('fade-in'); }
});
/* Show/hide genre row */
const genreRow = document.getElementById('genre-row');
genreRow.classList.toggle('hidden', !id);
}

/* ===== Detail Modal ===== */
function openModal(movie) {
const modal = document.getElementById('detail-modal');
const body = document.getElementById('modal-body');
const yearStr = movie.year ? String(movie.year) : '';
const ratingStr = movie.rating ? movie.rating.toFixed(1) : '';
const genreTags = movie.genres.map(g =>
`<span class="inline-block text-xs px-2.5 py-1 rounded" style="background:rgba(212,168,75,0.12);color:#D4A84B;">${g}</span>`
).join(' ');

let hfLabel = '';
if (movie.hitFlop) {
const hf = movie.hitFlop;
if (hf >= 7) hfLabel = 'Blockbuster';
else if (hf >= 5) hfLabel = 'Hit';
else if (hf >= 3) hfLabel = 'Average';
else hfLabel = 'Flop';
}

const sequelBadge = movie.sequel && String(movie.sequel) !== '0' && String(movie.sequel).toLowerCase() !== 'no'
? `<span class="text-xs px-2 py-0.5 rounded ml-2" style="background:rgba(155,27,48,0.2);color:#D4A84B;">Sequel</span>` : '';

const imdbLink = movie.imdbId
? `<a href="https://www.imdb.com/title/tt${movie.imdbId}/" target="_blank" rel="noopener" class="inline-flex items-center gap-2 text-sm text-gold hover:text-gold-light transition-colors"><i class="fab fa-imdb text-lg"></i> View on IMDb</a>`
: '';

/* "Why this pick?" explanation */
let whyHtml = '';
if (currentMood) {
const moodObj = MOODS.find(m => m.id === currentMood);
const matchedGenres = movie.genres.filter(g => moodObj.genres.some(mg => norm(mg) === norm(g)));
if (matchedGenres.length) {
whyHtml = `<div class="mt-4 pt-4 border-t border-border">
<p class="text-dimmed text-xs uppercase tracking-wider mb-1.5">Why this pick</p>
<p class="text-muted text-xs">Matches your <span class="text-gold">${moodObj.label}</span> mood through ${matchedGenres.join(', ')}</p>
</div>`;
}
}

body.innerHTML = `
<div class="flex justify-between items-start mb-5">
<div class="flex-1 min-w-0 pr-4">
<h2 class="font-display text-2xl sm:text-3xl font-bold text-cream leading-tight">${movie.title}</h2>
<div class="flex items-center gap-3 mt-2 flex-wrap">
${yearStr ? `<span class="text-muted text-sm">${yearStr}</span>` : ''}
${ratingStr ? `<span class="text-sm font-semibold" style="color:#D4A84B;"><i class="fas fa-star text-xs mr-1"></i>${ratingStr}/10</span>` : ''}
${sequelBadge}
${hfLabel ? `<span class="text-xs px-2 py-0.5 rounded" style="background:rgba(212,168,75,0.1);color:#8A8078;">${hfLabel}</span>` : ''}
</div>
</div>
<button id="modal-close" class="text-dimmed hover:text-cream transition-colors text-xl p-1 -mt-1" aria-label="Close">
<i class="fas fa-times"></i>
</button>
</div>
${genreTags ? `<div class="flex flex-wrap gap-2 mb-5">${genreTags}</div>` : ''}
<div class="space-y-4">
${movie.directors.length ? `<div><p class="text-dimmed text-xs uppercase tracking-wider mb-1">Director${movie.directors.length > 1 ? 's' : ''}</p><p class="text-cream text-sm">${movie.directors.join(', ')}</p></div>` : ''}
${movie.actors.length ? `<div><p class="text-dimmed text-xs uppercase tracking-wider mb-1">Cast</p><p class="text-cream text-sm">${movie.actors.join(', ')}</p></div>` : ''}
${movie.writers.length ? `<div><p class="text-dimmed text-xs uppercase tracking-wider mb-1">Writer${movie.writers.length > 1 ? 's' : ''}</p><p class="text-cream text-sm">${movie.writers.join(', ')}</p></div>` : ''}
${movie.runtime ? `<div><p class="text-dimmed text-xs uppercase tracking-wider mb-1">Runtime</p><p class="text-cream text-sm">${movie.runtime}</p></div>` : ''}
</div>
${whyHtml}
${imdbLink ? `<div class="mt-5 pt-4 border-t border-border">${imdbLink}</div>` : ''}
`;

modal.classList.remove('hidden');
document.body.style.overflow = 'hidden';
document.getElementById('modal-close').addEventListener('click', closeModal);
}

function closeModal() {
document.getElementById('detail-modal').classList.add('hidden');
document.body.style.overflow = '';
}

/* ===== Bokeh Background ===== */
function createBokeh() {
const container = document.getElementById('bokeh-container');
const elements = [
{ size: 220, x: '5%', y: '10%', color: 'rgba(212,168,75,0.06)', blur: 60, anim: 'drift1', dur: '25s' },
{ size: 160, x: '80%', y: '5%', color: 'rgba(155,27,48,0.07)', blur: 50, anim: 'drift2', dur: '30s' },
{ size: 300, x: '60%', y: '60%', color: 'rgba(212,168,75,0.04)', blur: 80, anim: 'drift3', dur: '22s' },
{ size: 120, x: '15%', y: '70%', color: 'rgba(155,27,48,0.05)', blur: 40, anim: 'drift1', dur: '28s' },
{ size: 180, x: '90%', y: '80%', color: 'rgba(212,168,75,0.05)', blur: 55, anim: 'drift2', dur: '26s' },
{ size: 100, x: '40%', y: '30%', color: 'rgba(155,27,48,0.04)', blur: 35, anim: 'drift3', dur: '20s' },
{ size: 250, x: '25%', y: '90%', color: 'rgba(212,168,75,0.03)', blur: 70, anim: 'drift1', dur: '35s' },
{ size: 140, x: '70%', y: '40%', color: 'rgba(155,27,48,0.05)', blur: 45, anim: 'drift2', dur: '24s' },
];
elements.forEach((el, i) => {
const div = document.createElement('div');
div.className = 'bokeh';
div.style.cssText = `width:${el.size}px;height:${el.size}px;left:${el.x};top:${el.y};background:${el.color};filter:blur(${el.blur}px);animation:${el.anim} ${el.dur} ease-in-out infinite;animation-delay:-${i * 3}s;`;
container.appendChild(div);
});
}

/* ===== Core Recommendation Flow ===== */
async function getRecommendationsAndRender() {
const hasInput = currentMood || currentGenre || currentSearch;

if (!hasInput) {
showSection('');
document.getElementById('genre-row').classList.add('hidden');
return;
}

if (!dataLoaded) {
showSection('loading-state');
await dataPromise;
}

const results = getRecommendations();
lastResults = sortResults(results, currentSort);
visibleCount = 12;

if (lastResults.length === 0) {
showSection('empty-state');
document.getElementById('genre-row').classList.remove('hidden');
} else {
showSection('results-section');
renderGenreChips();
renderResults(lastResults);
}

updateTagline();
}

function updateTagline() {
const el = document.getElementById('hero-tagline');
if (currentMood) {
const moodObj = MOODS.find(m => m.id === currentMood);
const lines = {
feelgood: 'Time for something uplifting.',
intense: 'Ready for an adrenaline rush?',
emotional: 'Grab the tissues. This one hits different.',
dark: 'Ready to go down a dark alley?',
epic: 'Prepare for something grand.',
fun: 'Let the good times roll.',
romantic: 'Falling in love, one film at a time.'};
el.textContent = lines[currentMood] || 'What should we watch tonight?';
} else if (currentSearch) {
el.textContent = 'Looking for something specific?';
} else if (currentGenre) {
el.textContent = `${currentGenre} it is.`;
} else {
el.textContent = 'What should we watch tonight?';
}
}

/* ===== Event Handlers ===== */
let searchTimeout = null;

function onSearchInput() {
clearTimeout(searchTimeout);
const val = document.getElementById('search-input').value.trim();
document.getElementById('clear-btn').classList.toggle('hidden', val.length === 0);

/* If search is active, clear mood selection */
if (val.length > 1) {
currentSearch = val;
currentMood = '';
currentGenre = '';
renderMoodGrid();
} else {
currentSearch = '';
}

searchTimeout = setTimeout(getRecommendationsAndRender, 250);
}

/* ===== Initialization ===== */
function init() {
createBokeh();
renderMoodGrid();
renderGenreChips();

/* Start data fetch silently */
dataPromise = loadData().then(data => {
movies = data;
dataLoaded = true;
}).catch(err => {
console.error('Data load error:', err);
dataLoaded = true;
});

/* Mood card clicks */
document.getElementById('mood-grid').addEventListener('click', (e) => {
const card = e.target.closest('.mood-card');
if (!card) return;
const mood = card.dataset.mood;
if (currentMood === mood) {
currentMood = '';
} else {
currentMood = mood;
currentGenre = '';
currentSearch = '';
document.getElementById('search-input').value = '';
document.getElementById('clear-btn').classList.add('hidden');
/* Collapse search if open */
const sc = document.getElementById('search-collapse');
sc.style.maxHeight = '0';
sc.style.opacity = '0';
}
currentSort = 'recommended';
shuffleSeed = Math.random();
renderMoodGrid();
getRecommendationsAndRender();
});

/* Surprise Me */
document.getElementById('surprise-btn').addEventListener('click', async () => {
const dice = document.querySelector('#surprise-btn .fa-dice');
dice.classList.add('wiggle');
setTimeout(() => dice.classList.remove('wiggle'), 500);

if (!dataLoaded) {
showSection('loading-state');
await dataPromise;
}

/* Pick a random mood */
const randomMood = MOODS[Math.floor(Math.random() * MOODS.length)];
currentMood = randomMood.id;
currentGenre = '';
currentSearch = '';
document.getElementById('search-input').value = '';
document.getElementById('clear-btn').classList.add('hidden');
currentSort = 'recommended';
shuffleSeed = Math.random();
renderMoodGrid();
getRecommendationsAndRender();
});

/* Toggle search */
document.getElementById('toggle-search-btn').addEventListener('click', () => {
const sc = document.getElementById('search-collapse');
const isOpen = sc.style.maxHeight !== '0px' && sc.style.maxHeight !== '';
if (isOpen) {
sc.style.maxHeight = '0';
sc.style.opacity = '0';
} else {
sc.style.maxHeight = '80px';
sc.style.opacity = '1';
setTimeout(() => document.getElementById('search-input').focus(), 300);
}
});

/* Search input */
document.getElementById('search-input').addEventListener('input', onSearchInput);

/* Clear search */
document.getElementById('clear-btn').addEventListener('click', () => {
document.getElementById('search-input').value = '';
currentSearch = '';
document.getElementById('clear-btn').classList.add('hidden');
getRecommendationsAndRender();
document.getElementById('search-input').focus();
});

/* Genre chips (delegated) */
document.getElementById('genre-chips').addEventListener('click', (e) => {
const chip = e.target.closest('.genre-chip');
if (!chip) return;
const genre = chip.dataset.genre;
if (currentGenre === genre) {
currentGenre = '';
} else {
currentGenre = genre;
}
shuffleSeed = Math.random();
renderGenreChips();
getRecommendationsAndRender();
});

/* Sort buttons */
document.getElementById('sort-options').addEventListener('click', (e) => {
const btn = e.target.closest('.sort-btn');
if (!btn) return;
currentSort = btn.dataset.sort;
if (lastResults.length > 0) {
lastResults = sortResults(lastResults, currentSort);
renderResults(lastResults);
}
});

/* Shuffle */
document.getElementById('reshuffle-btn').addEventListener('click', () => {
shuffleSeed = Math.random();
if (lastResults.length > 0) {
lastResults = sortResults(getRecommendations(), currentSort);
visibleCount = 12;
renderResults(lastResults);
}
});

/* Load more */
document.getElementById('load-more-btn').addEventListener('click', () => {
visibleCount += 12;
renderResults(lastResults);
});

/* Card clicks → modal */
document.getElementById('results-grid').addEventListener('click', (e) => {
const card = e.target.closest('.card-inner');
if (!card) return;
const idx = parseInt(card.dataset.idx);
if (idx >= 0 && idx < lastResults.length) openModal(lastResults[idx]);
});

/* Keyboard on cards */
document.getElementById('results-grid').addEventListener('keydown', (e) => {
if (e.key === 'Enter' || e.key === ' ') {
const card = e.target.closest('.card-inner');
if (!card) return;
e.preventDefault();
const idx = parseInt(card.dataset.idx);
if (idx >= 0 && idx < lastResults.length) openModal(lastResults[idx]);
}
});

/* Modal close */
document.getElementById('modal-backdrop').addEventListener('click', closeModal);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
}

document.addEventListener('DOMContentLoaded', init);
</script></body>
</html>
